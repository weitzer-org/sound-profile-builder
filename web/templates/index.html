<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC-2 Multi-Agent Modeler</title>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #cbd5e1;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            padding: 3rem 1.5rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            align-items: start;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-sub);
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-sub);
        }

        select, input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            background: rgba(59, 130, 246, 0.1);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button.htmx-request {
            opacity: 0.7;
            cursor: wait;
        }

        #result-container {
            margin-top: 2rem;
        }

        .grid-matrix {
            margin-top: 1rem;
            padding: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid var(--border);
            color: var(--success);
        }
        /* Glassmorphism Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2.5rem;
            width: 450px;
            max-width: 90vw;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .modal-header h3 {
            margin: 0;
            font-size: 1.6rem;
            color: #f8fafc;
        }
        .modal-close {
            background: none;
            border: none;
            color: #cbd5e1;
            font-size: 2rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            width: auto;
        }
        .modal-close:hover {
            color: #fff;
            background: transparent;
        }
        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            flex: 1;
        }
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .btn-save {
            background: #10b981;
            color: #fff;
            flex: 1;
        }
        .btn-save:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LEFT COLUMN: Main ADK Generator Workspace -->
        <div>
            <h1>QC-2 Modeler</h1>
            <p class="subtitle">AI-Driven Physics & Preset Orchestration Pipeline</p>

            <div class="card">
                <form hx-post="/api/preset/generate" hx-target="#result" hx-indicator="#submit-btn">
                    
                    <div class="form-group">
                        <label>Target Guitar Hardware</label>
                        <select name="guitar" multiple required style="height: 100px;">
                            <option value="Gibson ES-339 Humbuckers" selected>Gibson ES-339 (Humbuckers) - Bass Roll Off</option>
                            <option value="Fender Telecaster Single Coil">Fender Telecaster (American Pro II)</option>
                            <option value="Fender Stratocaster Single Coil">Fender Stratocaster</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tonal Prompt</label>
                        <input type="text" name="prompt" placeholder="e.g. Generate a preset for 'Texas Flood' by Stevie Ray Vaughan..." required>
                    </div>

                    <button type="submit" id="submit-btn" style="padding: 1rem; width: 100%;">Spin Up ADK & Generate Preset</button>
                </form>
            </div>

            <div id="result-container">
                <div id="result">
                    <!-- HTMX Fragment will inject the Matrix Table and Agent Impact here -->
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN: Saved Presets Sidebar -->
        <div>
            <div class="card" style="position: sticky; top: 2rem;">
                <h2 style="margin-top:0;">Saved Presets</h2>
                <div id="preset-list-container" hx-get="/api/presets" hx-trigger="load">
                    <!-- HTMX will load the presets here -->
                    <p class="subtitle" style="font-size:0.9rem;">Loading presets from GCS...</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
