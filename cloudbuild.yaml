steps:
# 0a. Execute Go Unit Tests and Generate Coverage (Do not fail immediately on error)
- name: 'golang:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - 'go build ./... > /workspace/build-errors.txt 2>&1 || true && go test -coverprofile=/workspace/coverage.out -v ./... > /workspace/test-results.txt 2>&1 && go tool cover -func=/workspace/coverage.out > /workspace/coverage.txt 2>&1 || echo "FAIL_MARKER" >> /workspace/test-results.txt'

# 0b. Upload Test Logs & Coverage to Cloud Storage & Fail pipeline if tests failed
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
  - '-c'
  - 'gcloud storage cp /workspace/build-errors.txt gs://${_RESULTS_BUCKET}/build-errors.txt || true && gcloud storage cp /workspace/test-results.txt gs://${_RESULTS_BUCKET}/test-results.txt && gcloud storage cp /workspace/coverage.txt gs://${_RESULTS_BUCKET}/coverage.txt || true && grep -q "FAIL_MARKER" /workspace/test-results.txt && exit 1 || exit 0'

# 0c. Validate CorOS Mappings
- name: 'golang:latest'
  entrypoint: 'go'
  args: ['run', 'cmd/validate_mappings/main.go']

# 1. Base Docker Build 
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/sound-builder/sound-builder-dev', '.']

# 2. Push generated image artifact into private project Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/sound-builder/sound-builder-dev']

# 2b. Upload CorOS Map to App Data Bucket (Git as Source of Truth)
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
  - '-c'
  - 'gcloud storage cp internal/agents/coros_map.json gs://${_DATA_BUCKET}/coros_map.json'

# 3. Spin up fully-managed Google Cloud Run container targeting us-central1
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
  - 'run'
  - 'deploy'
  - '${_SERVICE_NAME}'
  - '--image'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/sound-builder/sound-builder-dev'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

# 4. Explicitly echo the live generated HTTPS URL back to the Cloud Build terminal logs
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
  - '-c'
  - 'echo "🚀 YOUR LIVE DASHBOARD URL IS: " && gcloud run services describe ${_SERVICE_NAME} --region us-central1 --format "value(status.url)"'

options:
  # Route the build to execute on your pre-created private worker pool with faster machines!
  pool:
    name: 'projects/$PROJECT_ID/locations/us-central1/workerPools/faster-machine'
  # Bypass VPC-SC restrictions on default Cloud Storage logs buckets
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _RESULTS_BUCKET: 'sound-builder-prod-results'
  _DATA_BUCKET: 'sound-builder-prod-data'
  _SERVICE_NAME: 'sound-builder-prod'
